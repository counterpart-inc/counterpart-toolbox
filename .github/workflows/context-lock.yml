name: context-lock

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check context.lock
        env:
          CONTEXT_LOCK_HARD: "1"
          CONTEXT_LOCK_BASE_BRANCH: main
        run: bash scripts/context-lock.sh ci-check
